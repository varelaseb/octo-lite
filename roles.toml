schema_version = 1

[policy]
concise = true
forbid_unicode_dashes = true
raw_adapter_spawn = false

[skill_sources.octo-lite]
kind = "repo"
path = "skills"

[skill_sources.profile]
kind = "profile"

[roles.meta-operator]
contract = "roles/meta-operator.md"
provider = "anthropic"
model = "claude-fable-5"
effort = "xhigh"
mode = "auto"
session = "persistent"
execution = "persistent"
service_tier = "default"
tools = ["Read", "Grep", "Glob", "Bash", "Skill", "Workflow"]
required_skills = ["herdr-comms"]

[[roles.meta-operator.conditional_skills]]
skill = "launch-meta-operator"
when = "operator-launch"

[roles.orchestrator]
contract = "roles/orchestrator.md"
provider = "anthropic"
model = "claude-opus-4-8[1m]"
effort = "high"
mode = "auto"
session = "persistent"
execution = "persistent"
service_tier = "default"
tools = ["Read", "Grep", "Glob", "Bash", "Edit", "Write", "Skill", "Workflow"]
required_skills = ["herdr-comms"]
# Operator choice at spawn: an orchestrator runs on the default opus runtime or,
# when the operator wants a Fable orchestrator, on the sanctioned Fable runtime.
alt_runtimes = [{ model = "claude-fable-5", effort = "xhigh" }]

[[roles.orchestrator.conditional_skills]]
skill = "octo-lite-issue-shaper"
when = "shaping"

[[roles.orchestrator.conditional_skills]]
skill = "grill-with-docs"
when = "shaping"

[[roles.orchestrator.conditional_skills]]
skill = "octo-lite-github"
when = "shaping"

[[roles.orchestrator.conditional_skills]]
skill = "octo-lite-loop"
when = "delivery"

[roles.shaping-reviewer]
contract = "roles/shaping-reviewer.md"
provider = "openai"
model = "gpt-5.6-sol"
effort = "xhigh"
mode = "never"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "read-restricted"
provenance = "relay-verbatim-rollout"
service_tier = "fast"
tools = ["repo-read", "linear-read", "github-read", "session-log-read"]
required_skills = []

[[roles.shaping-reviewer.conditional_skills]]
skill = "octo-lite-debug"
when = "workflow-blocker"

[roles.implementer]
contract = "roles/implementer.md"
provider = "anthropic"
model = "claude-opus-4-8[1m]"
effort = "xhigh"
mode = "auto"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "standard"
service_tier = "default"
tools = ["Read", "Grep", "Glob", "Bash", "Edit", "Write", "Skill"]
required_skills = ["tdd", "octo-lite-github"]

[[roles.implementer.conditional_skills]]
skill = "frontend-design"
when = "ui"

[[roles.implementer.conditional_skills]]
skill = "nodejs"
when = "nodejs"

[[roles.implementer.conditional_skills]]
skill = "pnpm"
when = "pnpm"

[[roles.implementer.conditional_skills]]
skill = "pnpm-patching"
when = "pnpm-patching"

[[roles.implementer.conditional_skills]]
skill = "pull"
when = "branch-sync"

[[roles.implementer.conditional_skills]]
skill = "python"
when = "python"

[[roles.implementer.conditional_skills]]
skill = "typescript"
when = "typescript"

[roles.code-reviewer]
contract = "roles/code-reviewer.md"
provider = "openai"
model = "gpt-5.6-sol"
effort = "high"
mode = "never"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "read-restricted"
provenance = "relay-verbatim-rollout"
service_tier = "default"
tools = ["repo-read", "shell-read", "linear-read", "github-read", "github-verdict-write"]
required_skills = ["octo-lite-github"]

[[roles.code-reviewer.conditional_skills]]
skill = "octo-lite-debug"
when = "workflow-blocker"

[[roles.code-reviewer.conditional_skills]]
skill = "pull"
when = "branch-sync"

[roles.qa-capture]
contract = "roles/qa-capture.md"
provider = "anthropic"
model = "claude-sonnet-5"
effort = "high"
mode = "auto"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "standard"
service_tier = "default"
tools = ["Read", "Grep", "Glob", "Bash", "Edit", "Write", "Skill"]
required_skills = ["qa-evidence-capture"]
conditional_skills = []

[roles.qa-reviewer]
contract = "roles/qa-reviewer.md"
provider = "openai"
model = "gpt-5.6-sol"
effort = "high"
mode = "never"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "read-restricted"
provenance = "relay-verbatim-rollout"
service_tier = "fast"
tools = ["repo-read", "artifact-read", "image-read", "video-frame-read"]
required_skills = []
conditional_skills = []

[roles.reconciler]
contract = "roles/reconciler.md"
provider = "anthropic"
model = "claude-sonnet-5"
effort = "high"
mode = "auto"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "read-restricted"
service_tier = "default"
tools = ["Read"]
required_skills = []
conditional_skills = []

[roles.tdd-observer]
contract = "roles/tdd-observer.md"
provider = "anthropic"
model = "claude-sonnet-5"
effort = "high"
mode = "never"
session = "fresh"
execution = "workflow-subagent"
subagent_access = "read-restricted"
service_tier = "default"
tools = ["Read", "Grep", "Glob", "Bash"]
required_skills = []
