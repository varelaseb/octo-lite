name: Role contracts

on:
  pull_request:
    paths:
      - roles.toml
      - roles/**
      - agents/**
      - workflows/lib/role_resolver.py
      - tests/test_role_resolver.py
      - .github/workflows/role-contracts.yml
  push:
    paths:
      - roles.toml
      - roles/**
      - agents/**
      - workflows/lib/role_resolver.py
      - tests/test_role_resolver.py
      - .github/workflows/role-contracts.yml

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 workflows/lib/role_resolver.py check
      - run: python3 -m unittest tests/test_role_resolver.py
